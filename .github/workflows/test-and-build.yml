name: CI

on:
  push:
    branches: [master]
    paths:
      - "**.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Justfile"
      - "package.json"
      - "bun.lock"
      - "biome.json"
      - "tsconfig.json"
      - ".codex/**"
      - ".agents/**"
      - ".agent/**"
      - ".claude/**"
      - ".github/workflows/**"
      - "assets/**"
      - "README.md"
      - "docs/**"
      - "openspec/**"
      - "scripts/**"
      - "tests/**"
      - "crates/**"
      - "vendor/**"
  pull_request:
    branches: [master]
    paths:
      - "**.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Justfile"
      - "package.json"
      - "bun.lock"
      - "biome.json"
      - "tsconfig.json"
      - ".codex/**"
      - ".agents/**"
      - ".agent/**"
      - ".claude/**"
      - ".github/workflows/**"
      - "assets/**"
      - "README.md"
      - "docs/**"
      - "openspec/**"
      - "scripts/**"
      - "tests/**"
      - "crates/**"
      - "vendor/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test and Build
    if: >-
      github.event_name != 'push' || (
        !startsWith(github.event.head_commit.message, 'Merge pull request ') &&
        !contains(github.event.head_commit.message, '(#')
      )
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Prepare Windows Git checkout
        if: matrix.os == 'windows-latest'
        run: |
          git config --global core.longpaths true
          git config --global core.autocrlf false
          git config --global core.eol lf

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: clippy, rustfmt, llvm-tools-preview

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: ci-${{ matrix.os }}-stable-default

      - name: Install Bun
        if: matrix.os != 'windows-latest'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install JavaScript dependencies
        if: matrix.os != 'windows-latest'
        run: bun install --frozen-lockfile

      - name: Install cargo-llvm-cov
        if: matrix.os == 'ubuntu-latest'
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Check Rust types
        run: cargo check --workspace --locked

      - name: Check formatting
        if: matrix.os != 'windows-latest'
        run: just fmt-check

      - name: Run Windows format check
        if: matrix.os == 'windows-latest'
        run: cargo fmt --all -- --check

      - name: Run linter
        if: matrix.os != 'windows-latest'
        run: just lint

      - name: Run AST linter
        if: matrix.os != 'windows-latest'
        run: just ast-lint

      - name: Check runtime bundle sync
        if: matrix.os != 'windows-latest'
        run: just runtime-bundle-check

      - name: Install Graphviz for PlantUML
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Run tests
        run: cargo test --workspace --all-targets --all-features --locked

      - name: Install PlantUML runtime
        run: just plantuml-install

      - name: Run PlantUML smoke check
        if: matrix.os != 'windows-latest'
        run: |
          cargo run -p katana-render-runtime-cli -- plantuml render --input tests/fixtures/plantuml/representative/01-sequence.puml --output "$RUNNER_TEMP/plantuml-sequence.svg"
          grep -q '<svg' "$RUNNER_TEMP/plantuml-sequence.svg"

      - name: Run PlantUML smoke check on Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $output = Join-Path $env:RUNNER_TEMP "plantuml-sequence.svg"
          cargo run -p katana-render-runtime-cli -- plantuml render --input tests/fixtures/plantuml/representative/01-sequence.puml --output $output
          if (-not (Select-String -Path $output -Pattern "<svg" -Quiet)) {
            throw "PlantUML smoke output did not contain SVG"
          }

      - name: Check dependency boundary
        if: matrix.os != 'windows-latest'
        run: just dependency-leak

      - name: Check TypeScript formatting and lint
        if: matrix.os != 'windows-latest'
        run: just biome

      - name: Check TypeScript types
        if: matrix.os != 'windows-latest'
        run: just typecheck

      - name: Check runtime asset checksums
        if: matrix.os != 'windows-latest'
        run: just runtime-asset-check

      - name: Check packaged runtime bundles
        if: matrix.os == 'ubuntu-latest'
        run: just runtime-bundle-package-check

      - name: Check packaged PlantUML runtime manifest
        if: matrix.os == 'ubuntu-latest'
        run: just plantuml-runtime-package-check

      - name: Run coverage
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true
        run: just coverage
