name: Release

on:
  pull_request:
    types: [closed]
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example v0.1.0. Defaults to Cargo.toml version."
        required: false
        type: string
      publish_crates:
        description: "Publish workspace crates to crates.io"
        required: false
        default: true
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' || (
        github.event.pull_request.merged == true &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        startsWith(github.event.pull_request.head.ref, 'release/v')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - uses: taiki-e/install-action@v2.77.6
        with:
          tool: just
      - uses: taiki-e/install-action@v2.77.6
        with:
          tool: cargo-llvm-cov
      - run: just browser-install
      - name: Resolve version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          PULL_REQUEST_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        shell: bash
        run: |
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            version="${PULL_REQUEST_HEAD_REF}"
            version="${version#release/}"
          elif [[ -n "${INPUT_VERSION}" ]]; then
            version="${INPUT_VERSION}"
          else
            version="$(awk -F '"' '/^version = / { print "v" $2; exit }' Cargo.toml)"
          fi
          bash scripts/release/verify-version.sh "${version}" >> "$GITHUB_OUTPUT"
      - run: just VERSION="${{ steps.version.outputs.version }}" release-verify
      - name: Create release tag
        env:
          TAG: ${{ steps.version.outputs.version }}
        run: |
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "refs/tags/${TAG}"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --latest --verify-tag
          else
            gh release create "${TAG}" --verify-tag --latest --generate-notes
          fi
      - name: Publish crates.io
        if: github.event_name == 'pull_request' || inputs.publish_crates == true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: bash scripts/release/publish-crates.sh "${{ steps.version.outputs.version }}"
