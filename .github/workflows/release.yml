name: Release

on:
  pull_request:
    types: [closed]
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example v0.1.0. Defaults to Cargo.toml version."
        required: false
        type: string
      publish_crates:
        description: "Publish workspace crates to crates.io"
        required: false
        default: true
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' || (
        github.event.pull_request.merged == true &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        startsWith(github.event.pull_request.head.ref, 'release/v')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.ref }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: release-ubuntu-stable-publish

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Resolve version
        id: version
        shell: bash
        run: |
          bash scripts/release/resolve-release-version.sh \
            "${{ github.event_name }}" \
            "${{ inputs.version }}" \
            "${{ github.event.pull_request.head.ref }}"

      - name: Release target check
        env:
          GH_TOKEN: ${{ github.token }}
        run: just VERSION="${{ steps.version.outputs.version }}" release-target-check

      - name: Verify release package
        run: just VERSION="${{ steps.version.outputs.version }}" release-verify

      - name: Create release tag
        env:
          TAG: ${{ steps.version.outputs.version }}
        run: |
          bash scripts/release/assert-tag-safe.sh "${TAG}" origin
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "refs/tags/${TAG}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --latest --verify-tag
          else
            gh release create "${TAG}" --verify-tag --latest --generate-notes
          fi

      - name: Publish crates.io
        if: github.event_name == 'pull_request' || inputs.publish_crates == true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: bash scripts/release/publish-crates.sh "${{ steps.version.outputs.version }}"
