name: release-preflight

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  release-preflight:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'release/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - uses: taiki-e/install-action@v2.77.1
        with:
          tool: just
      - uses: taiki-e/install-action@v2.77.1
        with:
          tool: cargo-llvm-cov
      - run: just browser-install
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            version="${GITHUB_HEAD_REF#release/}"
          else
            version="$(awk -F '"' '/^version = / { print "v" $2; exit }' Cargo.toml)"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - run: just VERSION="${{ steps.version.outputs.version }}" release-check
