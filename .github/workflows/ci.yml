name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.detect.outputs.code }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Detect code changes
        id: detect
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${BASE_SHA}" || "${BASE_SHA}" =~ ^0+$ ]]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          code=false
          while IFS= read -r file; do
            case "${file}" in
              "" | README.md | LICENSE | docs/* | assets/*)
                ;;
              *)
                code=true
                ;;
            esac
          done < <(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")

          echo "code=${code}" >> "$GITHUB_OUTPUT"

  lint:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip docs-only changes
        if: needs.changes.outputs.code != 'true'
        run: echo "No code changes detected; skipping lint."
      - uses: actions/checkout@v6.0.2
        if: needs.changes.outputs.code == 'true'
      - uses: dtolnay/rust-toolchain@stable
        if: needs.changes.outputs.code == 'true'
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        if: needs.changes.outputs.code == 'true'
      - uses: taiki-e/install-action@just
        if: needs.changes.outputs.code == 'true'
      - if: needs.changes.outputs.code == 'true'
        run: just fmt-check
      - if: needs.changes.outputs.code == 'true'
        run: just lint

  ast-lint:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip docs-only changes
        if: needs.changes.outputs.code != 'true'
        run: echo "No code changes detected; skipping ast-lint."
      - uses: actions/checkout@v6.0.2
        if: needs.changes.outputs.code == 'true'
      - uses: dtolnay/rust-toolchain@stable
        if: needs.changes.outputs.code == 'true'
      - uses: Swatinem/rust-cache@v2
        if: needs.changes.outputs.code == 'true'
      - uses: taiki-e/install-action@just
        if: needs.changes.outputs.code == 'true'
      - if: needs.changes.outputs.code == 'true'
        run: just ast-lint

  test:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip docs-only changes
        if: needs.changes.outputs.code != 'true'
        run: echo "No code changes detected; skipping tests."
      - uses: actions/checkout@v6.0.2
        if: needs.changes.outputs.code == 'true'
      - uses: dtolnay/rust-toolchain@stable
        if: needs.changes.outputs.code == 'true'
      - uses: Swatinem/rust-cache@v2
        if: needs.changes.outputs.code == 'true'
      - uses: taiki-e/install-action@just
        if: needs.changes.outputs.code == 'true'
      - if: needs.changes.outputs.code == 'true'
        run: just unit-test

  dependency-leak:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip docs-only changes
        if: needs.changes.outputs.code != 'true'
        run: echo "No code changes detected; skipping dependency leak check."
      - uses: actions/checkout@v6.0.2
        if: needs.changes.outputs.code == 'true'
      - uses: dtolnay/rust-toolchain@stable
        if: needs.changes.outputs.code == 'true'
      - uses: Swatinem/rust-cache@v2
        if: needs.changes.outputs.code == 'true'
      - uses: taiki-e/install-action@just
        if: needs.changes.outputs.code == 'true'
      - if: needs.changes.outputs.code == 'true'
        run: just dependency-leak

  coverage:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip docs-only changes
        if: needs.changes.outputs.code != 'true'
        run: echo "No code changes detected; skipping coverage."
      - uses: actions/checkout@v6.0.2
        if: needs.changes.outputs.code == 'true'
      - uses: dtolnay/rust-toolchain@stable
        if: needs.changes.outputs.code == 'true'
      - uses: Swatinem/rust-cache@v2
        if: needs.changes.outputs.code == 'true'
      - uses: taiki-e/install-action@just
        if: needs.changes.outputs.code == 'true'
      - uses: taiki-e/install-action@cargo-llvm-cov
        if: needs.changes.outputs.code == 'true'
      - if: needs.changes.outputs.code == 'true'
        run: just coverage
