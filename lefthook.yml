# lefthook.yml
no_tty: true
output:
  - failure

pre-commit:
  parallel: false
  commands:
    fmt-check:
      glob: "{*.rs,*.toml,*.lock,Justfile}"
      run: just fmt-check
    lint:
      glob: "{*.rs,*.toml,*.lock,Justfile}"
      run: just lint
    ast-lint:
      glob: "{*.rs,*.toml,*.lock,Justfile}"
      run: just ast-lint

pre-push:
  commands:
    release-verify:
      glob: "{*.rs,*.toml,*.lock,Justfile}"
      run: just release-verify

pre-pr:
  commands:
    release-openspec-archive:
      run: bash scripts/release/check-openspec-release-archive.sh
      only:
        - ref: release/v*
