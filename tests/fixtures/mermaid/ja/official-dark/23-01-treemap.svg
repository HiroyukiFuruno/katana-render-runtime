<svg id="official-23-01-treemap" width="100%" xmlns="http://www.w3.org/2000/svg" viewBox="2 -2.34375 996 430.34375" style="max-width: 996px;" class="flowchart" role="graphics-document document" aria-roledescription="treemap"><style>#official-23-01-treemap{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;fill:#e0e0e0;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#official-23-01-treemap .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#official-23-01-treemap .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#official-23-01-treemap .error-icon{fill:#a44141;}#official-23-01-treemap .error-text{fill:#ddd;stroke:#ddd;}#official-23-01-treemap .edge-thickness-normal{stroke-width:1px;}#official-23-01-treemap .edge-thickness-thick{stroke-width:3.5px;}#official-23-01-treemap .edge-pattern-solid{stroke-dasharray:0;}#official-23-01-treemap .edge-thickness-invisible{stroke-width:0;fill:none;}#official-23-01-treemap .edge-pattern-dashed{stroke-dasharray:3;}#official-23-01-treemap .edge-pattern-dotted{stroke-dasharray:2;}#official-23-01-treemap .marker{fill:#AAAAAA;stroke:#AAAAAA;}#official-23-01-treemap .marker.cross{stroke:#AAAAAA;}#official-23-01-treemap svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;}#official-23-01-treemap p{margin:0;}#official-23-01-treemap .treemapNode.section{stroke:black;stroke-width:1;fill:#efefef;}#official-23-01-treemap .treemapNode.leaf{stroke:black;stroke-width:1;fill:#efefef;}#official-23-01-treemap .treemapLabel{fill:#e0e0e0;font-size:12px;}#official-23-01-treemap .treemapValue{fill:#e0e0e0;font-size:10px;}#official-23-01-treemap .treemapTitle{fill:#e0e0e0;font-size:14px;}#official-23-01-treemap .node .neo-node{stroke:#ccc;}#official-23-01-treemap [data-look="neo"].node rect,#official-23-01-treemap [data-look="neo"].cluster rect,#official-23-01-treemap [data-look="neo"].node polygon{stroke:url(#official-23-01-treemap-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#official-23-01-treemap [data-look="neo"].node path{stroke:url(#official-23-01-treemap-gradient);stroke-width:1px;}#official-23-01-treemap [data-look="neo"].node .outer-path{filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#official-23-01-treemap [data-look="neo"].node .neo-line path{stroke:#ccc;filter:none;}#official-23-01-treemap [data-look="neo"].node circle{stroke:url(#official-23-01-treemap-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#official-23-01-treemap [data-look="neo"].node circle .state-start{fill:#000000;}#official-23-01-treemap [data-look="neo"].icon-shape .icon{fill:url(#official-23-01-treemap-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#official-23-01-treemap [data-look="neo"].icon-shape .icon-neo path{stroke:url(#official-23-01-treemap-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#official-23-01-treemap :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g></g><text x="500" y="15" class="treemapTitle" text-anchor="middle" dominant-baseline="middle">ランタイムコスト</text><g transform="translate(0, 30)" class="treemapContainer"><g class="treemapSection" transform="translate(0,0)"><rect width="1000" height="25" class="treemapSectionHeader" fill="none" fill-opacity="0.6" stroke-width="0.6" style="display: none;"></rect><clipPath id="clip-section-official-23-01-treemap-0"><rect width="988" height="25"></rect></clipPath><rect width="1000" height="400" class="treemapSection section0" fill="transparent" fill-opacity="0.6" stroke="transparent" stroke-width="2" stroke-opacity="0.4" style="display: none;"></rect><text class="treemapSectionLabel" x="6" y="12.5" dominant-baseline="middle" font-weight="bold" style="display: none;"></text><text class="treemapSectionValue" x="990" y="12.5" text-anchor="end" dominant-baseline="middle" font-style="italic" style="display: none;">100</text></g><g class="treemapNode treemapLeafGroup leaf0x" transform="translate(10,35)"><rect width="436" height="355" class="treemapLeaf" fill="transparent" style="" fill-opacity="0.3" stroke="transparent" stroke-width="3"></rect><clipPath id="clip-official-23-01-treemap-0"><rect width="432" height="351"></rect></clipPath><text class="treemapLabel" x="218" y="177.5" style="text-anchor: middle; dominant-baseline: middle; font-size: 38px;fill:lightgrey;" clip-path="url(#clip-official-23-01-treemap-0)">Mermaid</text><text class="treemapValue" x="218" y="198.5" style="text-anchor: middle; dominant-baseline: hanging; font-size: 23px; fill: lightgrey;" clip-path="url(#clip-official-23-01-treemap-0)">45</text></g><g class="treemapNode treemapLeafGroup leaf1x" transform="translate(456,35)"><rect width="435" height="193" class="treemapLeaf" fill="transparent" style="" fill-opacity="0.3" stroke="transparent" stroke-width="3"></rect><clipPath id="clip-official-23-01-treemap-1"><rect width="431" height="189"></rect></clipPath><text class="treemapLabel" x="217.5" y="96.5" style="text-anchor: middle; dominant-baseline: middle; font-size: 38px;fill:lightgrey;" clip-path="url(#clip-official-23-01-treemap-1)">DOM shim</text><text class="treemapValue" x="217.5" y="117.5" style="text-anchor: middle; dominant-baseline: hanging; font-size: 23px; fill: lightgrey;" clip-path="url(#clip-official-23-01-treemap-1)">25</text></g><g class="treemapNode treemapLeafGroup leaf2x" transform="translate(456,238)"><rect width="435" height="152" class="treemapLeaf" fill="transparent" style="" fill-opacity="0.3" stroke="transparent" stroke-width="3"></rect><clipPath id="clip-official-23-01-treemap-2"><rect width="431" height="148"></rect></clipPath><text class="treemapLabel" x="217.5" y="76" style="text-anchor: middle; dominant-baseline: middle; font-size: 38px;fill:lightgrey;" clip-path="url(#clip-official-23-01-treemap