<svg id="official-22-01-tree-view-beta" width="100%" xmlns="http://www.w3.org/2000/svg" viewBox="-0.5 0 150.203125 232" style="max-width: 150.203125px;" role="graphics-document document" aria-roledescription="treeView"><style>#official-22-01-tree-view-beta{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;fill:#333333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#official-22-01-tree-view-beta .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#official-22-01-tree-view-beta .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#official-22-01-tree-view-beta .error-icon{fill:#552222;}#official-22-01-tree-view-beta .error-text{fill:#552222;stroke:#552222;}#official-22-01-tree-view-beta .edge-thickness-normal{stroke-width:1px;}#official-22-01-tree-view-beta .edge-thickness-thick{stroke-width:3.5px;}#official-22-01-tree-view-beta .edge-pattern-solid{stroke-dasharray:0;}#official-22-01-tree-view-beta .edge-thickness-invisible{stroke-width:0;fill:none;}#official-22-01-tree-view-beta .edge-pattern-dashed{stroke-dasharray:3;}#official-22-01-tree-view-beta .edge-pattern-dotted{stroke-dasharray:2;}#official-22-01-tree-view-beta .marker{fill:#555555;stroke:#555555;}#official-22-01-tree-view-beta .marker.cross{stroke:#555555;}#official-22-01-tree-view-beta svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;}#official-22-01-tree-view-beta p{margin:0;}#official-22-01-tree-view-beta .treeView-node-label{font-size:16px;fill:black;}#official-22-01-tree-view-beta .treeView-node-line{stroke:black;}#official-22-01-tree-view-beta .node .neo-node{stroke:#9370DB;}#official-22-01-tree-view-beta [data-look="neo"].node rect,#official-22-01-tree-view-beta [data-look="neo"].cluster rect,#official-22-01-tree-view-beta [data-look="neo"].node polygon{s