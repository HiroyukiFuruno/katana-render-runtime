<svg id="official-16-02-pie" width="100%" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 563 450" style="max-width: 563px;" role="graphics-document document" aria-roledescription="pie"><style>#official-16-02-pie{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;fill:#333333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#official-16-02-pie .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#official-16-02-pie .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#official-16-02-pie .error-icon{fill:#552222;}#official-16-02-pie .error-text{fill:#552222;stroke:#552222;}#official-16-02-pie .edge-thickness-normal{stroke-width:1px;}#official-16-02-pie .edge-thickness-thick{stroke-width:3.5px;}#official-16-02-pie .edge-pattern-solid{stroke-dasharray:0;}#official-16-02-pie .edge-thickness-invisible{stroke-width:0;fill:none;}#official-16-02-pie .edge-pattern-dashed{stroke-dasharray:3;}#official-16-02-pie .edge-pattern-dotted{stroke-dasharray:2;}#official-16-02-pie .marker{fill:#555555;stroke:#555555;}#official-16-02-pie .marker.cross{stroke:#555555;}#official-16-02-pie svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;}#official-16-02-pie p{margin:0;}#official-16-02-pie .pieCircle{stroke:black;stroke-width:2px;opacity:0.7;}#official-16-02-pie .pieOuterCircle{stroke:black;stroke-width:2px;fill:none;}#official-16-02-pie .pieTitleText{text-anchor:middle;font-size:25px;fill:black;font-family:"trebuchet ms",verdana,arial,sans-serif;}#official-16-02-pie .slice{font-family:"trebuchet ms",verdana,arial,sans-serif;fill:#333;font-size:17px;}#official-16-02-pie .legend text{fill:black;font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:17px;}#official-16-02-pie .node .neo-node{stroke:#9370DB;}#official-16-02-pie [data-look="neo"].node rect,#official-16-02-pie [data-look="neo"].cluster rect,#official-16-02-pie [data-look="neo"].node polygon{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#official-16-02-pie [data-look="neo"].node path{stroke:#9370DB;stroke-width:1px;}#official-16-02-pie [data-look="neo"].node .outer-path{filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#official-16-02-pie [data-look="neo"].node .neo-line path{stroke:#9370DB;filter:none;}#official-16-02-pie [data-look="neo"].node circle{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#official-16-02-pie [data-look="neo"].node circle .state-start{fill:#000000;}#official-16-02-pie [data-look="neo"].icon-shape .icon{fill:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#official-16-02-pie [data-look="neo"].icon-shape .icon-neo path{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#official-16-02-pie :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g></g><g transform="translate(225,225)"><circle cx="0" cy="0" r="186" class="pieOuterCircle"></circle><path d="M0,-185A185,185,0,1,1,-177.899,-50.763L0,0Z" fill="#ECECFF" class="pieCircle"></path><path d="M-177.899,-50.763A185,185,0,0,1,-35.652,-181.532L0,0Z" fill="#ffffde" class="pieCircle"></path><path d="M-35.652,-181.532A185,185,0,0,1,0,-185L0,0Z" fill="hsl(80, 100%, 56.2745098039%)" class="pieCircle"></path><text transform="translate(83.57344705444068,110.75667676234512)" class="slice" style="text-anchor: middle;">79%</text><text transform="translate(-93.90333582091016,-102.14561185731559)" class="slice" style="text-anchor: middle;">17%</text><text transform="translate(-13.432508310066218,-138.09826291630174)" class="slice" style="text-anchor: middle;">3%</text><text x="0" y="-200" class="pieTitleText">ボランティアに引き取られたペット</text><g class="legend" transform="translate(216,-33)"><rect width="18" height="18" style="fill: #ECECFF; stroke: #ECECFF;"></rect><text x="22" y="