<svg id="official-17-01-quadrant-chart" width="100%" xmlns="http://www.w3.org/2000/svg" style="max-width: 500px;" viewBox="0 0 500 500" role="graphics-document document" aria-roledescription="quadrantChart"><style>#official-17-01-quadrant-chart{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;fill:#333333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#official-17-01-quadrant-chart .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#official-17-01-quadrant-chart .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#official-17-01-quadrant-chart .error-icon{fill:#552222;}#official-17-01-quadrant-chart .error-text{fill:#552222;stroke:#552222;}#official-17-01-quadrant-chart .edge-thickness-normal{stroke-width:1px;}#official-17-01-quadrant-chart .edge-thickness-thick{stroke-width:3.5px;}#official-17-01-quadrant-chart .edge-pattern-solid{stroke-dasharray:0;}#official-17-01-quadrant-chart .edge-thickness-invisible{stroke-width:0;fill:none;}#official-17-01-quadrant-chart .edge-pattern-dashed{stroke-dasharray:3;}#official-17-01-quadrant-chart .edge-pattern-dotted{stroke-dasharray:2;}#official-17-01-quadrant-chart .marker{fill:#555555;stroke:#555555;}#official-17-01-quadrant-chart .marker.cross{stroke:#555555;}#official-17-01-quadrant-chart svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;}#official-17-01-quadrant-chart p{margin:0;}#official-17-01-quadrant-chart .node .neo-node{stroke:#9370DB;}#official-17-01-quadrant-chart [data-look="neo"].node rect,#official-17-01-quadrant-chart [data-look="neo"].cluster rect,#official-17-01-quadrant-chart [data-look="neo"].node polygon{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#official-17-01-quadrant-chart [data-look="neo"].node path{stroke:#9370DB;stroke-width:1px;}#official-17-01-quadrant-chart [data-look="neo"].node .outer-path{filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#official-17-01-quadrant-chart [data-look="neo"].node .neo-line path{stroke:#9370DB;filter:none;}#official-17-01-quadrant-chart [data-look="neo"].node circle{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#official-17-01-quadrant-chart [data-look="neo"].node circle .state-start{fill:#000000;}#official-17-01-quadrant-chart [data-look="neo"].icon-shape .icon{fill:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#official-17-01-quadrant-chart [data-look="neo"].icon-shape .icon-neo path{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#official-17-01-quadrant-chart :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g></g><g class="main"><g class="quadrants"><g class="quadrant"><rect x="263" y="45" width="232" height="212" fill="#ECECFF"></rect><text x="0" y="0" fill="#131300" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(379, 50) rotate(0)">候補</text></g><g class="quadrant"><rect x="31" y="45" width="232" height="212" fill="#f1f1ff"></rect><text x="0" y="0" fill="#0e0e00" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(147, 50) rotate(0)">要改善</text></g><g class="quadrant"><rect x="31" y="257" width="232" height="212" fill="#f6f6ff"></rect><text x="0" y="0" fill="#090900" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(147, 262) rotate(0)">却下</text></g><g class="quadrant"><rect x="263" y="257" width="232" height="212" fill="#fbfbff"></rect><text x="0" y="0" fill="#040400" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(379, 262) rotate(0)">過剰品質</text></g></g><g class="border"><line x1="30" y1="45" x2="496" y2="45" style="stroke: rgb(199, 199, 241); stroke-width: 2;"></line><line x1="495" y1="46" x2="495" y2="468" style="stroke: rgb(199, 199, 241); stroke-width: 2;"></line><line x1="30" y1="469" x2="496" y2="469" style="stroke: rgb(199, 199, 241); stroke-width: 2;"></line><line x1="31" y1="46" x2="31" y2="468" style="stroke: rgb(199, 199, 241); stroke-width: 2;"></line><line x1="263" y1="46" x2="263" y2="468" style="stroke: rgb(199, 199, 241); stroke-width: 1;"></line><line x1="32" y1="257" x2="494" y2="257" style="stroke: rgb(199, 199, 241); stroke-width: 1;"></line></g><g class="data-points"><g class="data-point"><circle cx="193.4" cy="384.20000000000005" r="5" fill="hsl(240, 100%, NaN%)" stroke="hsl(240, 100%, NaN%)" stroke-width="0px"></circle><text x="0" y="0" fill="#131300" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(193.4, 389.20000000000005) rotate(0)">OS Chrome</text></g><g class="data-point"><circle cx="411.47999999999996" cy="104.36000000000001" r="5" fill="hsl(240, 100%, NaN%)" stroke="hsl(240, 100%, NaN%)" stroke-width="0px"></circle><text x="0" y="0" fill="#131300" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(411.47999999999996, 109.36000000000001) rotate(0)">Rust管理JS</text></g></g><g class="labels"><g class="label"><text x="0" y="0" fill="#131300" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(147, 479) rotate(0)">低速</text></g><g class="label"><text x="0" y="0" fill="#131300" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(379, 479) rotate(0)">高速</text></g><g class="label"><text x="0" y="0" fill="#131300" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(5, 363) rotate(-90)">OS依存</text></g><g class="label"><text x="0" y="0" fill="#131300" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(5, 151) rotate(-90)">OS非依存</text></g></g><g class="title"><text x="0" y="0" fill="#131300" font-size="20" dominant-baseline="hanging" text-anchor="middle