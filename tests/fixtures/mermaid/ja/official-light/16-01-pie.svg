<svg id="official-16-01-pie" width="100%" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 696.28125 450" style="max-width: 696.28125px;" role="graphics-document document" aria-roledescription="pie"><style>#official-16-01-pie{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;fill:#333333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#official-16-01-pie .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#official-16-01-pie .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#official-16-01-pie .error-icon{fill:#552222;}#official-16-01-pie .error-text{fill:#552222;stroke:#552222;}#official-16-01-pie .edge-thickness-normal{stroke-width:1px;}#official-16-01-pie .edge-thickness-thick{stroke-width:3.5px;}#official-16-01-pie .edge-pattern-solid{stroke-dasharray:0;}#official-16-01-pie .edge-thickness-invisible{stroke-width:0;fill:none;}#official-16-01-pie .edge-pattern-dashed{stroke-dasharray:3;}#official-16-01-pie .edge-pattern-dotted{stroke-dasharray:2;}#official-16-01-pie .marker{fill:#555555;stroke:#555555;}#official-16-01-pie .marker.cross{stroke:#555555;}#official-16-01-pie svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;}#official-16-01-pie p{margin:0;}#official-16-01-pie .pieCircle{stroke:black;stroke-width:2px;opacity:0.7;}#official-16-01-pie .pieOuterCircle{stroke:black;stroke-width:2px;fill:none;}#official-16-01-pie .pieTitleText{text-anchor:middle;font-size:25px;fill:black;font-family:"trebuchet ms",verdana,arial,sans-serif;}#official-16-01-pie .slice{font-family:"trebuchet ms",verdana,arial,sans-serif;fill:#333;font-size:17px;}#official-16-01-pie .legend text{fill:black;font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:17px;}#official-16-01-pie .node .neo-node{stroke:#9370DB;}#official-16-01-pie [data-look="neo"].node rect,#official-16-01-pie [data-look="neo"].cluster rect,#official-16-01-pie [data-look="neo"].node polygon{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#official-16-01-pie [data-look="neo"].node path{stroke:#9370DB;stroke-width:1px;}#official-16-01-pie [data-look="neo"].node .outer-path{filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#official-16-01-pie [data-look="neo"].node .neo-line path{stroke:#9370DB;filter:none;}#official-16-01-pie [data-look="neo"].node circle{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#official-16-01-pie [data-look="neo"].node circle .state-start{fill:#000000;}#official-16-01-pie [data-look="neo"].icon-shape .icon{fill:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#official-16-01-pie [data-look="neo"].icon-shape .icon-neo path{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#official-16-01-pie :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g></g><g transform="translate(225,225)"><circle cx="0" cy="0" r="186" class="pieOuterCircle"></circle><path d="M0,-185A185,185,0,1,1,-175.945,57.168L0,0Z" fill="#ECECFF" class="pieCircle"></path><path d="M-175.945,57.168A185,185,0,0,1,-108.74,-149.668L0,0Z" fill="#ffffde" class="pieCircle"></path><path d="M-108.74,-149.668A185,185,0,0,1,0,-185L0,0Z" fill="hsl(80, 100%, 56.2745098039%)" class="pieCircle"></path><text transform="translate(112.25110796952396,81.55520375558065)" class="slice" style="text-anchor: middle;">70%</text><text transform="translate(-131.95909163595257,-42.876107969523936)" class="slice" style="text-anchor: middle;">20%</text><text transform="translate(-42.87610796952397,-131.95909163595255)" class="slice" style="text-anchor: middle;">10%</text><text x="0" y="-200" class="pieTitleText">レンダリング所有権</text><g class="legend" transform="translate(216,-33)"><rect width="18" height="18" style="fill: #ECECFF; stroke: #ECECFF;"></rect><text x="22"