<svg height="450" id="official-16-02-pie-chart-pets" width="547" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 547 450" style="max-width: 547px;" role="graphics-document document" aria-roledescription="pie"><style>#official-16-02-pie-chart-pets{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;fill:#e0e0e0;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#official-16-02-pie-chart-pets .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#official-16-02-pie-chart-pets .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#official-16-02-pie-chart-pets .error-icon{fill:#a44141;}#official-16-02-pie-chart-pets .error-text{fill:#ddd;stroke:#ddd;}#official-16-02-pie-chart-pets .edge-thickness-normal{stroke-width:1px;}#official-16-02-pie-chart-pets .edge-thickness-thick{stroke-width:3.5px;}#official-16-02-pie-chart-pets .edge-pattern-solid{stroke-dasharray:0;}#official-16-02-pie-chart-pets .edge-thickness-invisible{stroke-width:0;fill:none;}#official-16-02-pie-chart-pets .edge-pattern-dashed{stroke-dasharray:3;}#official-16-02-pie-chart-pets .edge-pattern-dotted{stroke-dasharray:2;}#official-16-02-pie-chart-pets .marker{fill:#AAAAAA;stroke:#AAAAAA;}#official-16-02-pie-chart-pets .marker.cross{stroke:#AAAAAA;}#official-16-02-pie-chart-pets svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;}#official-16-02-pie-chart-pets p{margin:0;}#official-16-02-pie-chart-pets .pieCircle{stroke:black;stroke-width:2px;opacity:0.7;}#official-16-02-pie-chart-pets .pieOuterCircle{stroke:black;stroke-width:2px;fill:none;}#official-16-02-pie-chart-pets .pieTitleText{text-anchor:middle;font-size:25px;fill:lightgrey;font-family:"trebuchet ms",verdana,arial,sans-serif;}#official-16-02-pie-chart-pets .slice{font-family:"trebuchet ms",verdana,arial,sans-serif;fill:#e0e0e0;font-size:17px;}#official-16-02-pie-chart-pets .legend text{fill:lightgrey;font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:17px;}#official-16-02-pie-chart-pets .node .neo-node{stroke:#ccc;}#official-16-02-pie-chart-pets [data-look="neo"].node rect,#official-16-02-pie-chart-pets [data-look="neo"].cluster rect,#official-16-02-pie-chart-pets [data-look="neo"].node polygon{stroke:url(#official-16-02-pie-chart-pets-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#official-16-02-pie-chart-pets [data-look="neo"].node path{stroke:url(#official-16-02-pie-chart-pets-gradient);stroke-width:1px;}#official-16-02-pie-chart-pets [data-look="neo"].node .outer-path{filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#official-16-02-pie-chart-pets [data-look="neo"].node .neo-line path{stroke:#ccc;filter:none;}#official-16-02-pie-chart-pets [data-look="neo"].node circle{stroke:url(#official-16-02-pie-chart-pets-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#official-16-02-pie-chart-pets [data-look="neo"].node circle .state-start{fill:#000000;}#official-16-02-pie-chart-pets [data-look="neo"].icon-shape .icon{fill:url(#official-16-02-pie-chart-pets-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#official-16-02-pie-chart-pets [data-look="neo"].icon-shape .icon-neo path{stroke:url(#official-16-02-pie-chart-pets-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#official-16-02-pie-chart-pets :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g></g><g transform="translate(225,225)"><circle cx="0" cy="0" r="186" class="pieOuterCircle"></circle><path d="M0,-185A185,185,0,1,1,-177.899,-50.763L0,0Z" fill="#0b0000" class="pieCircle"></path><path d="M-177.899,-50.763A185,185,0,0,1,-35.652,-181.532L0,0Z" fill="#4d1037" class="pieCircle"></path><path d="M-35.652,-181.532A185,185,0,0,1,0,-185L0,0Z" fill="#3f5258" class="pieCircle"></path><text transform="translate(83.5734470544